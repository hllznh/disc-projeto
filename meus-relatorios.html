<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meus Relatórios — DISC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="font-black text-2xl tracking-tight text-gray-900">DISC</a>
      <a href="index.html" class="text-sm text-gray-500 hover:text-gray-800 transition">← Início</a>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto px-6 pt-16 pb-20">

    <!-- Header -->
    <div class="text-center mb-10">
      <span class="inline-block bg-indigo-50 text-indigo-700 text-xs font-bold uppercase tracking-widest px-4 py-1.5 rounded-full mb-4">Histórico</span>
      <h1 class="text-4xl font-black text-gray-900 mb-3">Meus Relatórios</h1>
      <p class="text-gray-500">Digite seu e-mail para acessar todos os seus relatórios salvos.</p>
    </div>

    <!-- Search form -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-8">
      <div class="flex gap-3">
        <input id="input-email" type="email" placeholder="seu@email.com"
          class="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"/>
        <button onclick="buscar()"
          class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition whitespace-nowrap">
          Buscar
        </button>
      </div>
      <p id="err-email" class="text-xs text-rose-500 mt-2 hidden">Informe um e-mail válido.</p>
    </div>

    <!-- Results -->
    <div id="results-area"></div>

  </div>

  <script>
    Storage.init();

    const COLOR = {
      D: { bg:'bg-red-500',   light:'bg-red-50',   text:'text-red-600',   border:'border-red-200'  },
      I: { bg:'bg-amber-500', light:'bg-amber-50', text:'text-amber-600', border:'border-amber-200' },
      S: { bg:'bg-green-500', light:'bg-green-50', text:'text-green-600', border:'border-green-200' },
      C: { bg:'bg-blue-500',  light:'bg-blue-50',  text:'text-blue-600',  border:'border-blue-200'  },
    };

    // Allow pressing Enter in the email field
    document.getElementById('input-email').addEventListener('keydown', e => {
      if (e.key === 'Enter') buscar();
    });

    // Pre-fill email from last session if available
    document.addEventListener('DOMContentLoaded', () => {
      const cached = localStorage.getItem('disc_perfil_result');
      if (cached) {
        try {
          const d = JSON.parse(cached);
          if (d.email) document.getElementById('input-email').value = d.email;
        } catch {}
      }
    });

    async function buscar() {
      const email = document.getElementById('input-email').value.trim();
      const errEl = document.getElementById('err-email');
      const area  = document.getElementById('results-area');

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errEl.classList.remove('hidden');
        return;
      }
      errEl.classList.add('hidden');

      area.innerHTML = `<p class="text-center text-gray-400 py-8">Buscando relatórios...</p>`;

      const records = await Storage.getByEmail(email);

      if (!records.length) {
        area.innerHTML = `
          <div class="text-center py-12 bg-white rounded-2xl border border-gray-100 shadow-sm">
            <p class="text-gray-400 mb-4">Nenhum relatório encontrado para este e-mail.</p>
            <a href="quiz-perfil.html" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition">
              Fazer a Análise →
            </a>
          </div>`;
        return;
      }

      area.innerHTML = `
        <p class="text-xs text-gray-400 font-semibold uppercase tracking-widest mb-4">${records.length} relatório${records.length > 1 ? 's' : ''} encontrado${records.length > 1 ? 's' : ''}</p>
        <div class="space-y-4">
          ${records.map(r => renderCard(r)).join('')}
        </div>`;
    }

    function renderCard(r) {
      const dom = (r.dominant && r.dominant[0]) || 'D';
      const c   = COLOR[dom];
      const profile = DISC_PROFILES[dom];
      const date = r.createdAt ? new Date(r.createdAt).toLocaleDateString('pt-BR', {
        day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'
      }) : '—';
      const scores = r.scores || {};
      const label = r.quizType === 'perfil-oficial' ? 'Análise Oficial' : 'Quiz Rápido';

      return `
        <a href="resultado-perfil.html?id=${r.id}"
           class="block bg-white rounded-2xl border ${c.border} shadow-sm hover:shadow-md transition-all p-6 group">
          <div class="flex items-start justify-between gap-4">
            <div class="flex items-center gap-4">
              <div class="w-14 h-14 ${c.bg} rounded-xl flex items-center justify-center flex-shrink-0 group-hover:scale-105 transition-transform">
                <span class="text-2xl font-black text-white">${dom}</span>
              </div>
              <div>
                <p class="text-xs font-bold uppercase tracking-wider ${c.text} mb-0.5">${label}</p>
                <h3 class="font-black text-gray-900 text-lg leading-tight">${profile ? profile.name : dom}</h3>
                <p class="text-xs text-gray-400 mt-0.5">${date}</p>
              </div>
            </div>
            <div class="hidden sm:flex gap-2 flex-wrap justify-end">
              ${['D','I','S','C'].map(l => {
                const s = scores[l];
                if (s === undefined) return '';
                const cc = COLOR[l];
                return `<span class="text-xs font-bold px-2 py-1 rounded-lg ${cc.light} ${cc.text}">${l} ${s > 0 ? '+' : ''}${s}</span>`;
              }).join('')}
            </div>
          </div>
          <div class="mt-4 flex items-center justify-between">
            <p class="text-sm text-gray-500">Respondido por <strong class="text-gray-700">${r.nome || ''}</strong></p>
            <span class="text-xs text-indigo-600 font-semibold group-hover:underline">Ver relatório →</span>
          </div>
        </a>`;
    }
  </script>
</body>
</html>
