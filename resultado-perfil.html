<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resultado — Análise de Perfil DISC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="font-black text-2xl tracking-tight text-gray-900">DISC</a>
      <div class="flex items-center gap-4">
        <a href="meus-relatorios.html" class="text-sm text-indigo-600 hover:underline">Meus relatórios</a>
        <button onclick="reset()" class="text-sm text-gray-500 hover:text-gray-800 transition">Refazer análise</button>
      </div>
    </div>
  </nav>

  <div class="max-w-3xl mx-auto px-6 py-12" id="result-root">
    <p class="text-center text-gray-400">Carregando seu resultado...</p>
  </div>

  <footer class="border-t border-gray-100 py-8 text-center text-sm text-gray-400 mt-4">
    Baseado em <em>Análise de Perfil Pessoal</em> · Metodologia DISC · Jorge Matos e Vânia Portela
  </footer>

  <script>
    Storage.init();

    const STORAGE_KEY = 'disc_perfil_result';

    const COLOR = {
      D: { bg:'bg-red-500',   light:'bg-red-50',   text:'text-red-600',   border:'border-red-300',   hex:'#DC2626', barPos:'#DC2626', barNeg:'#FECACA' },
      I: { bg:'bg-amber-500', light:'bg-amber-50', text:'text-amber-600', border:'border-amber-300', hex:'#D97706', barPos:'#D97706', barNeg:'#FDE68A' },
      S: { bg:'bg-green-500', light:'bg-green-50', text:'text-green-600', border:'border-green-300', hex:'#16A34A', barPos:'#16A34A', barNeg:'#BBF7D0' },
      C: { bg:'bg-blue-500',  light:'bg-blue-50',  text:'text-blue-600',  border:'border-blue-300',  hex:'#2563EB', barPos:'#2563EB', barNeg:'#BFDBFE' },
    };

    function interpretScore(score) {
      if (score >= 12) return { label: 'Muito alto', desc: 'Característica muito dominante no seu perfil' };
      if (score >= 6)  return { label: 'Alto',       desc: 'Característica bem presente no seu perfil' };
      if (score >= 1)  return { label: 'Moderado',   desc: 'Característica presente de forma equilibrada' };
      if (score === 0) return { label: 'Neutro',     desc: 'Característica equilibrada entre positivo e negativo' };
      if (score >= -5) return { label: 'Baixo',      desc: 'Característica pouco predominante no seu perfil' };
      return               { label: 'Muito baixo',   desc: 'Característica raramente predominante no seu perfil' };
    }

    function dominantProfiles(scores) {
      const max = Math.max(scores.D, scores.I, scores.S, scores.C);
      return ['D','I','S','C'].filter(k => scores[k] === max);
    }

    function reset() {
      localStorage.removeItem(STORAGE_KEY);
      window.location.href = 'quiz-perfil.html';
    }

    async function render() {
      const root = document.getElementById('result-root');
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      let data = null;

      if (id) {
        data = await Storage.getById(id);
        // Also cache locally for quick refresh
        if (data) localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...data, completed: true }));
      }

      if (!data) {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) data = JSON.parse(raw);
      }

      if (!data) {
        root.innerHTML = `<div class="text-center py-20">
          <p class="text-gray-500 text-lg mb-6">Você ainda não realizou a análise.</p>
          <a href="quiz-perfil.html" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition">Fazer a Análise</a>
        </div>`;
        return;
      }
      const scores = data.scores; // { D, I, S, C }
      const dominant = dominantProfiles(scores);
      const domLetter = dominant[0];
      const profile = DISC_PROFILES[domLetter];
      const c = COLOR[domLetter];
      const talent = TALENTS.find(t => t.primary === domLetter) || TALENTS[0];

      root.innerHTML = `

        <!-- Header -->
        <div class="text-center mb-10">
          <p class="text-xs uppercase tracking-widest text-gray-400 font-semibold mb-3">Análise de Perfil Pessoal</p>
          <div class="inline-flex items-center justify-center w-24 h-24 ${c.bg} rounded-2xl shadow-lg mb-4">
            <span class="text-5xl font-black text-white">${domLetter}</span>
          </div>
          <h1 class="text-4xl font-black text-gray-900">${profile.name}</h1>
          <p class="text-gray-500 mt-3 max-w-xl mx-auto">${profile.description}</p>
          ${dominant.length > 1 ? `<p class="text-sm text-gray-400 mt-2">Empate entre: ${dominant.join(', ')}</p>` : ''}
        </div>

        <!-- Official Graph (−20 to +20) -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 mb-6">
          <h2 class="font-bold text-gray-800 mb-1">Gráfico de perfil</h2>
          <p class="text-xs text-gray-400 mb-6">Escala de −20 a +20 por fator</p>
          <div id="chart-container" class="relative"></div>
        </div>

        <!-- Score Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          ${['D','I','S','C'].map(l => {
            const s = scores[l];
            const interp = interpretScore(s);
            const cc = COLOR[l];
            return `<div class="bg-white rounded-xl border ${cc.border} p-4 text-center">
              <div class="text-3xl font-black ${cc.text} mb-1">${s > 0 ? '+' : ''}${s}</div>
              <div class="text-xs font-bold uppercase tracking-wider ${cc.text} mb-1">${l} — ${DISC_PROFILES[l].name}</div>
              <div class="text-xs text-gray-500">${interp.label}</div>
            </div>`;
          }).join('')}
        </div>

        <!-- Profile Detail -->
        <div class="grid md:grid-cols-2 gap-6 mb-6">
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-bold text-gray-800 mb-4">✅ Suas características</h2>
            <ul class="space-y-2">
              ${profile.traits.map(t => `<li class="flex items-center gap-2 text-sm text-gray-700"><span class="${c.text} font-bold">•</span>${t}</li>`).join('')}
            </ul>
          </div>
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-bold text-gray-800 mb-4">🚀 O que te motiva</h2>
            <ul class="space-y-2">
              ${profile.motivations.map(m => `<li class="flex items-center gap-2 text-sm text-gray-700"><span class="${c.text} font-bold">•</span>${m}</li>`).join('')}
            </ul>
          </div>
        </div>

        <!-- Fear -->
        <div class="${c.light} rounded-2xl p-6 mb-6 border ${c.border}">
          <h2 class="font-bold ${c.text} mb-2">⚠️ Medo básico</h2>
          <p class="text-gray-700">${profile.basicFear}</p>
        </div>

        <!-- Develop / Resize -->
        <div class="grid md:grid-cols-2 gap-6 mb-6">
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-bold text-gray-800 mb-4">📈 O que desenvolver</h2>
            <ul class="space-y-2">${profile.develop.map(d => `<li class="text-sm text-gray-700 flex gap-2"><span class="text-green-500">↑</span>${d}</li>`).join('')}</ul>
          </div>
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-bold text-gray-800 mb-4">⚖️ O que redimensionar</h2>
            <ul class="space-y-2">${profile.resize.map(r => `<li class="text-sm text-gray-700 flex gap-2"><span class="text-blue-500">↔</span>${r}</li>`).join('')}</ul>
          </div>
        </div>

        <!-- Talent match -->
        <div class="bg-gray-900 text-white rounded-2xl p-6 mb-6">
          <p class="text-xs uppercase tracking-widest text-gray-400 font-semibold mb-2">Talento natural compatível</p>
          <h2 class="text-2xl font-black mb-1">${talent.name}</h2>
          <p class="text-gray-300 mb-4">${talent.summary}</p>
          <div class="flex flex-wrap gap-2">${talent.traits.map(t => `<span class="bg-white/10 text-sm px-3 py-1 rounded-full">${t}</span>`).join('')}</div>
        </div>

        <!-- Leadership -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
          <h2 class="font-bold text-gray-800 mb-4">🎯 Como me liderar melhor</h2>
          <p class="text-sm text-gray-500 mb-4"><strong>Gestor ideal:</strong> ${profile.idealLeader}</p>
          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <p class="text-xs font-bold uppercase tracking-wider text-green-600 mb-2">Fazer</p>
              <ul class="space-y-1">${profile.leaderDo.map(d => `<li class="text-sm text-gray-700 flex gap-2"><span class="text-green-400">✓</span>${d}</li>`).join('')}</ul>
            </div>
            <div>
              <p class="text-xs font-bold uppercase tracking-wider text-red-500 mb-2">Não fazer</p>
              <ul class="space-y-1">${profile.leaderDont.map(d => `<li class="text-sm text-gray-700 flex gap-2"><span class="text-red-400">✗</span>${d}</li>`).join('')}</ul>
            </div>
          </div>
        </div>

        <!-- Score breakdown (per question) -->
        <details class="bg-white rounded-2xl border border-gray-100 shadow-sm mb-6">
          <summary class="p-6 font-bold text-gray-800 cursor-pointer hover:bg-gray-50 rounded-2xl">
            📋 Ver detalhamento por pergunta
          </summary>
          <div class="px-6 pb-6 overflow-x-auto">
            <table class="w-full text-sm min-w-[500px]">
              <thead>
                <tr class="border-b border-gray-100">
                  <th class="text-left py-2 text-gray-400 font-medium w-8">#</th>
                  <th class="text-left py-2 text-gray-400 font-medium">Afirmação</th>
                  <th class="text-center py-2 text-gray-400 font-medium w-16">Nota</th>
                  <th class="text-center py-2 text-gray-400 font-medium w-16">Fator</th>
                </tr>
              </thead>
              <tbody id="breakdown-body"></tbody>
            </table>
          </div>
        </details>

        <!-- CTA -->
        <div class="flex flex-col sm:flex-row gap-3 justify-center mt-8">
          <a href="perfis.html#${domLetter}" class="${c.bg} text-white text-center px-8 py-3 rounded-xl font-semibold hover:opacity-90 transition">Ver perfil completo</a>
          <a href="talentos.html" class="text-center border border-gray-200 bg-white text-gray-700 px-8 py-3 rounded-xl font-semibold hover:bg-gray-50 transition">Ver 40 talentos</a>
          <button onclick="reset()" class="text-center border border-gray-200 bg-white text-gray-500 px-8 py-3 rounded-xl font-semibold hover:bg-gray-50 transition">Refazer análise</button>
        </div>
      `;

      renderChart(scores);
      renderBreakdown(data.answers);
    }

    function renderChart(scores) {
      const container = document.getElementById('chart-container');
      const LABELS = ['D','I','S','C'];
      const MAX = 20;
      const HEIGHT = 200; // px for positive half
      const BAR_W = 64;

      container.innerHTML = `
        <div class="flex items-stretch justify-around gap-2">
          ${LABELS.map(l => {
            const s = scores[l];
            const cc = COLOR[l];
            const posH = s > 0 ? Math.round((s / MAX) * HEIGHT) : 0;
            const negH = s < 0 ? Math.round((-s / MAX) * HEIGHT) : 0;
            return `
              <div class="flex flex-col items-center gap-1 flex-1">
                <!-- positive half -->
                <div class="flex flex-col justify-end" style="height:${HEIGHT}px">
                  ${s > 0
                    ? `<div class="w-full rounded-t-lg flex items-end justify-center pb-1 text-white text-xs font-bold"
                           style="height:${posH}px; background:${cc.hex}">
                         ${s > 2 ? '+' + s : ''}
                       </div>`
                    : `<div style="height:0"></div>`}
                </div>
                <!-- zero line -->
                <div class="w-full h-px bg-gray-300"></div>
                <!-- negative half -->
                <div style="height:${HEIGHT}px" class="flex flex-col justify-start">
                  ${s < 0
                    ? `<div class="w-full rounded-b-lg flex items-start justify-center pt-1 text-xs font-bold"
                           style="height:${negH}px; background:${cc.barNeg}; color:${cc.hex}">
                         ${negH > 20 ? s : ''}
                       </div>`
                    : `<div style="height:0"></div>`}
                </div>
                <!-- Label -->
                <div class="text-center mt-2">
                  <div class="text-base font-black ${cc.text}">${l}</div>
                  <div class="text-xs text-gray-400">${s > 0 ? '+' : ''}${s}</div>
                </div>
              </div>`;
          }).join('')}
        </div>
        <!-- Scale labels -->
        <div class="flex justify-end mt-4 gap-4 text-xs text-gray-400">
          <span>Escala: −20 a +20</span>
        </div>`;
    }

    function renderBreakdown(answers) {
      const tbody = document.getElementById('breakdown-body');
      if (!tbody || !answers) return;
      const discMap = { A:'D', B:'I', C:'S', D:'C' };
      tbody.innerHTML = PERFIL_QUESTIONS.map((q, i) => {
        const val = answers[i] ?? 0;
        const contribution = val * q.sign;
        const disc = discMap[q.factor];
        const cc = COLOR[disc];
        return `<tr class="border-b border-gray-50">
          <td class="py-2 text-gray-400">${q.id}</td>
          <td class="py-2 text-gray-700 pr-4">${q.text}</td>
          <td class="py-2 text-center font-bold text-gray-800">${val}</td>
          <td class="py-2 text-center">
            <span class="inline-block text-xs font-bold px-2 py-0.5 rounded-full ${cc.light} ${cc.text}">${disc}</span>
          </td>
        </tr>`;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => render());
  </script>
</body>
</html>
