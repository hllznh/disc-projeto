<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz DISC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/data.js"></script>
  <script src="js/quiz.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="font-black text-2xl tracking-tight text-gray-900">DISC</a>
      <a href="index.html" class="text-sm text-gray-500 hover:text-gray-800 transition">← Voltar</a>
    </div>
  </nav>

  <!-- Progress Bar -->
  <div class="bg-white border-b border-gray-100">
    <div class="max-w-2xl mx-auto px-6 py-3 flex items-center gap-4">
      <div class="flex-1 bg-gray-100 rounded-full h-2 overflow-hidden">
        <div id="progress-bar" class="bg-indigo-500 h-2 rounded-full transition-all duration-500" style="width:0%"></div>
      </div>
      <span id="progress-label" class="text-xs text-gray-400 font-medium w-16 text-right">0 / 10</span>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-2xl mx-auto px-6 py-10">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-black text-gray-900">Questionário DISC</h1>
      <p class="text-gray-500 mt-2">Para cada grupo, escolha a palavra que <strong class="text-indigo-600">mais</strong> e a que <strong class="text-rose-500">menos</strong> representa você.</p>
    </div>

    <div id="quiz-wrapper">
      <div id="question-card" class="bg-white rounded-2xl shadow-lg p-8"></div>
      <div class="flex justify-between mt-6">
        <button id="btn-prev" onclick="prevQuestion()" class="hidden px-6 py-3 border border-gray-300 rounded-xl text-gray-600 hover:bg-gray-50 transition">← Anterior</button>
        <div class="flex-1"></div>
      </div>
    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', initQuiz);
  </script>
</body>
</html>
