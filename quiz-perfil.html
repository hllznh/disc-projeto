<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Análise de Perfil Pessoal — DISC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/data.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="font-black text-2xl tracking-tight text-gray-900">DISC</a>
      <a href="index.html" class="text-sm text-gray-500 hover:text-gray-800 transition">← Voltar</a>
    </div>
  </nav>

  <!-- Header -->
  <div class="max-w-3xl mx-auto px-6 pt-12 pb-6 text-center">
    <span class="inline-block bg-indigo-50 text-indigo-700 text-xs font-bold uppercase tracking-widest px-4 py-1.5 rounded-full mb-4">Instrumento oficial</span>
    <h1 class="text-4xl font-black text-gray-900 mb-3">Análise de Perfil Pessoal</h1>
    <p class="text-gray-500 max-w-xl mx-auto">Para cada afirmação, marque de <strong>0 a 5</strong> o quanto ela representa você no seu ambiente de trabalho.<br/>
    <span class="text-xs text-gray-400 mt-1 block">0 = não me representa · 5 = me representa totalmente</span></p>
  </div>

  <!-- Progress -->
  <div class="max-w-3xl mx-auto px-6 mb-6">
    <div class="flex items-center justify-between mb-1">
      <span class="text-xs text-gray-400 font-medium">Progresso</span>
      <span id="progress-label" class="text-xs text-gray-400 font-medium">0 / 32</span>
    </div>
    <div class="bg-gray-200 rounded-full h-2">
      <div id="progress-bar" class="bg-indigo-500 h-2 rounded-full transition-all duration-300" style="width:0%"></div>
    </div>
  </div>

  <!-- Questions -->
  <div class="max-w-3xl mx-auto px-6 pb-12">
    <div id="questions-list" class="space-y-4"></div>

    <!-- Submit -->
    <div class="mt-10 text-center">
      <p id="submit-warning" class="text-sm text-rose-500 mb-3 hidden">Responda todas as perguntas antes de continuar.</p>
      <button onclick="submitQuiz()"
        class="bg-indigo-600 text-white px-10 py-4 rounded-xl text-lg font-semibold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
        Ver meu resultado →
      </button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'disc_perfil_result';
    const answers = new Array(32).fill(null);

    function renderQuestions() {
      const list = document.getElementById('questions-list');
      list.innerHTML = PERFIL_QUESTIONS.map((q, i) => `
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5" id="q-card-${i}">
          <div class="flex items-start gap-4">
            <span class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-100 text-gray-500 text-sm font-bold flex items-center justify-center">${q.id}</span>
            <div class="flex-1">
              <p class="text-gray-800 font-medium mb-4">${q.text}</p>
              <div class="flex items-center gap-1 flex-wrap">
                <span class="text-xs text-gray-400 mr-1">Nada</span>
                ${[0,1,2,3,4,5].map(v => `
                  <button
                    onclick="setAnswer(${i}, ${v})"
                    id="q${i}-v${v}"
                    class="score-btn w-10 h-10 rounded-xl border-2 border-gray-200 text-sm font-bold text-gray-500
                           hover:border-indigo-400 hover:text-indigo-600 transition-all">
                    ${v}
                  </button>`).join('')}
                <span class="text-xs text-gray-400 ml-1">Totalmente</span>
              </div>
            </div>
          </div>
        </div>`).join('');
    }

    function setAnswer(qIndex, value) {
      answers[qIndex] = value;

      // Update button styles for this question
      for (let v = 0; v <= 5; v++) {
        const btn = document.getElementById(`q${qIndex}-v${v}`);
        if (!btn) continue;
        if (v === value) {
          btn.className = 'score-btn w-10 h-10 rounded-xl border-2 border-indigo-500 bg-indigo-500 text-white text-sm font-bold transition-all';
        } else {
          btn.className = 'score-btn w-10 h-10 rounded-xl border-2 border-gray-200 text-sm font-bold text-gray-500 hover:border-indigo-400 hover:text-indigo-600 transition-all';
        }
      }

      // Update card border
      const card = document.getElementById(`q-card-${qIndex}`);
      if (card) card.classList.add('border-indigo-100');

      updateProgress();
    }

    function updateProgress() {
      const answered = answers.filter(a => a !== null).length;
      const pct = Math.round((answered / 32) * 100);
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-label').textContent = `${answered} / 32`;
    }

    function submitQuiz() {
      const unanswered = answers.map((a, i) => a === null ? i : null).filter(i => i !== null);

      if (unanswered.length > 0) {
        document.getElementById('submit-warning').classList.remove('hidden');
        // Scroll to first unanswered
        const firstCard = document.getElementById(`q-card-${unanswered[0]}`);
        if (firstCard) {
          firstCard.classList.add('border-rose-300');
          firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        return;
      }

      document.getElementById('submit-warning').classList.add('hidden');
      const scores = calcPerfilScores(answers);
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ answers, scores, completed: true, date: new Date().toISOString() }));
      window.location.href = 'resultado-perfil.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Check if already done
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        if (data.completed) {
          document.getElementById('questions-list').innerHTML = `
            <div class="text-center py-16 bg-white rounded-2xl border border-gray-100 shadow-sm">
              <p class="text-2xl font-bold text-gray-800 mb-3">Você já realizou esta análise!</p>
              <p class="text-gray-500 mb-8">Seu perfil está salvo.</p>
              <a href="resultado-perfil.html" class="inline-block bg-indigo-600 text-white px-8 py-3 rounded-xl font-semibold hover:bg-indigo-700 transition mr-3">Ver Resultado</a>
              <button onclick="resetPerfil()" class="inline-block border border-gray-300 text-gray-600 px-8 py-3 rounded-xl font-semibold hover:bg-gray-50 transition">Refazer</button>
            </div>`;
          document.querySelector('.mt-10').classList.add('hidden');
          return;
        }
      }
      renderQuestions();
    });

    function resetPerfil() {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }
  </script>
</body>
</html>
