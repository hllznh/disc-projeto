<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>40 Talentos Naturais — DISC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/data.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="font-black text-2xl tracking-tight text-gray-900">DISC</a>
      <div class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-600">
        <a href="perfis.html"    class="hover:text-indigo-600 transition">Perfis</a>
        <a href="talentos.html"  class="text-indigo-600 font-semibold">40 Talentos</a>
        <a href="lideranca.html" class="hover:text-indigo-600 transition">Liderança</a>
        <a href="quiz-perfil.html" class="bg-indigo-600 text-white px-5 py-2 rounded-full hover:bg-indigo-700 transition">Análise Oficial</a>
        <a href="meus-relatorios.html" class="hover:text-indigo-600 transition">Meus Relatórios</a>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <div class="max-w-6xl mx-auto px-6 pt-12 pb-6">
    <h1 class="text-4xl font-black text-gray-900 mb-2">Os 40 Talentos Naturais</h1>
    <p class="text-gray-500 mb-6">Cada perfil DISC gera combinações únicas de talentos. Filtre por letra dominante.</p>

    <!-- Filter -->
    <div class="flex flex-wrap gap-2" id="filters">
      <button onclick="setFilter('all')" data-filter="all"
        class="filter-btn active px-4 py-2 rounded-full text-sm font-medium bg-gray-900 text-white transition">
        Todos (40)
      </button>
      <button onclick="setFilter('D')" data-filter="D"
        class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-red-50 text-red-700 hover:bg-red-100 transition">
        D — Dominância
      </button>
      <button onclick="setFilter('I')" data-filter="I"
        class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-amber-50 text-amber-700 hover:bg-amber-100 transition">
        I — Influência
      </button>
      <button onclick="setFilter('S')" data-filter="S"
        class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-green-50 text-green-700 hover:bg-green-100 transition">
        S — Estabilidade
      </button>
      <button onclick="setFilter('C')" data-filter="C"
        class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-blue-50 text-blue-700 hover:bg-blue-100 transition">
        C — Conformidade
      </button>
    </div>
  </div>

  <!-- Grid -->
  <div class="max-w-6xl mx-auto px-6 pb-16">
    <div id="talents-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    <p id="empty-msg" class="hidden text-center text-gray-400 py-12">Nenhum talento encontrado.</p>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 max-w-lg mx-auto bg-white rounded-2xl shadow-2xl p-8 max-h-[80vh] overflow-y-auto">
      <div id="modal-content"></div>
      <button onclick="closeModal()" class="mt-6 w-full border border-gray-200 text-gray-600 py-2 rounded-xl hover:bg-gray-50 transition">Fechar</button>
    </div>
  </div>

  <footer class="border-t border-gray-100 py-8 text-center text-sm text-gray-400">
    Baseado no material <em>Talento para a Vida</em> — Jorge Matos e Vânia Portela
  </footer>

  <script>
    const COLOR = {
      D: { light:'bg-red-50',   text:'text-red-600',   border:'border-red-200',   badge:'bg-red-100 text-red-700'   },
      I: { light:'bg-amber-50', text:'text-amber-600', border:'border-amber-200', badge:'bg-amber-100 text-amber-700' },
      S: { light:'bg-green-50', text:'text-green-600', border:'border-green-200', badge:'bg-green-100 text-green-700' },
      C: { light:'bg-blue-50',  text:'text-blue-600',  border:'border-blue-200',  badge:'bg-blue-100 text-blue-700'  },
    };
    const NAMES = { D:'Dominância', I:'Influência', S:'Estabilidade', C:'Conformidade' };

    let activeFilter = 'all';

    function setFilter(f) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => {
        const isActive = b.dataset.filter === f;
        b.classList.toggle('bg-gray-900', isActive && f === 'all');
        b.classList.toggle('text-white',  isActive && f === 'all');
      });
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('talents-grid');
      const empty = document.getElementById('empty-msg');
      const filtered = activeFilter === 'all' ? TALENTS : TALENTS.filter(t => t.primary === activeFilter);

      if (!filtered.length) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      grid.innerHTML = filtered.map(t => {
        const c = COLOR[t.primary];
        return `
          <div onclick="openModal(${t.id})"
            class="bg-white rounded-2xl border ${c.border} p-5 cursor-pointer hover:shadow-md transition-all group">
            <div class="flex items-start justify-between mb-3">
              <span class="${c.badge} text-xs font-bold px-2 py-0.5 rounded-full">${t.primary} · ${NAMES[t.primary]}</span>
              <span class="text-gray-300 group-hover:text-gray-500 transition">#${t.id}</span>
            </div>
            <h3 class="font-bold text-gray-900 text-lg mb-1">${t.name}</h3>
            <p class="text-sm text-gray-500">${t.summary}</p>
          </div>`;
      }).join('');
    }

    function openModal(id) {
      const t = TALENTS.find(x => x.id === id);
      if (!t) return;
      const c = COLOR[t.primary];
      document.getElementById('modal-content').innerHTML = `
        <div class="flex items-center gap-3 mb-4">
          <span class="${c.badge} text-xs font-bold px-3 py-1 rounded-full">${t.primary} · ${NAMES[t.primary]}</span>
        </div>
        <h2 class="text-2xl font-black text-gray-900 mb-1">${t.name}</h2>
        <p class="text-gray-500 mb-5">${t.summary}</p>
        <div class="mb-5">
          <p class="text-xs font-bold uppercase tracking-wider ${c.text} mb-2">Características básicas</p>
          <ul class="space-y-1">${t.traits.map(x => `<li class="text-sm text-gray-700 flex gap-2"><span class="${c.text}">•</span>${x}</li>`).join('')}</ul>
        </div>
        <div>
          <p class="text-xs font-bold uppercase tracking-wider text-indigo-600 mb-2">Motivações</p>
          <ul class="space-y-1">${t.motivations.map(x => `<li class="text-sm text-gray-700 flex gap-2"><span class="text-indigo-400">→</span>${x}</li>`).join('')}</ul>
        </div>`;
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    document.addEventListener('DOMContentLoaded', renderGrid);
  </script>
</body>
</html>
